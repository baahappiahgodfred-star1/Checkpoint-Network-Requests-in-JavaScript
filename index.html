<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather App</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="app">
    <h1>Weather App</h1>

    <form id="searchForm" class="search">
      <input id="cityInput" type="text" placeholder="Entrez une ville (ex: Paris)" aria-label="Ville" required />
      <button id="searchBtn" type="submit">Rechercher</button>
      <button id="geoBtn" type="button">Ma position</button>
    </form>

    <section id="card" class="card hidden">
      <div class="location"> <span id="location"></span> </div>
      <div class="main">
        <img id="icon" alt="" />
        <div class="temp"><span id="temp"></span>°C</div>
      </div>
      <div class="desc" id="description"></div>
      <div class="details">
        <div>Humidité: <span id="humidity"></span>%</div>
        <div>Vent: <span id="wind"></span> m/s</div>
      </div>
    </section>

    <p id="error" class="error"></p>
    <p class="note">N'oubliez pas d'ajouter votre clé API OpenWeatherMap dans <strong>script.js</strong>.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
